server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API and switch proxy calls to the Node server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_buffering off;
    }

    location /switch/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_buffering off;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
